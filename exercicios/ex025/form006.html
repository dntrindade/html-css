<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Outros exemplos de formulários</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <input type="color" name="cor" id="icor" value="red">
            <label for="icor">COR</label>
        </p>
        <p>
            <input type="range" name="niv" id="iniv" min="0%" max="100%" value="50%">
            <label for="iniv">Nível de Satisfação</label>
        </p>

        <p>
            <input type="file" name="img" id="iimg">
            <label for="iimg">Imagem de Perfil</label>
        </p>

        <p>
            <input type="submit" value="ENVIAR">
            <input type="reset" value="LIMPAR">
        </p>

    </form>
    
</body>
</html>
