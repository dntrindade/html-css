<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixais</title>
    <style>
        h1 { /* box-level */
            background-color: blueviolet;
            height: 300px;
            width: 300px;

            border-width: 15px;
            border-style: solid;
            border-color: rgb(247, 20, 179);

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: rgb(20, 230, 55);

            /* formato mais pratico:display:
            
            border: 15px solid rgb(247, 20, 179);
            padding: 10px 10px 10px 10px;
            margin: 20px 20px 40px 20px;
            outline: 5px dashed rgb(20, 230, 55);
            
            */
        }

        a { /* inline-level */
            border-width: 10px;
            border-style: solid;
            border-color: aqua;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixas box-level</h1>
    <p>Parágrafos tambem são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
