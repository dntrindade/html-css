<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: yellow;
            background-color: rgb(70, 57, 0);
            width: 300px;
        }

        div:hover {
            color: rebeccapurple;
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>PAsse o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO...</p>
    </div>
    <p>Fim do Exemplo</p>
    
</body>
</html>
