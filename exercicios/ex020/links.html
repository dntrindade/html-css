<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* SELETORES PERSONALIZADOS
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = clildren
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: rgb(0, 0, 0);
            text-decoration: none;
        }

        a:visited {
            color: rgb(243, 24, 159);
            font-weight: bold;
        }

        a:hover {
            color: rgb(0, 255, 0);
            text-decoration: underline;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <h1>Personaliando Links</h1>
    <ul>
        <li><a href="https://github.com/dntrindade" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://www.youtube.com/watch?v=nxOroELEZoY" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://kotlinlang.org/" target="_blank">Site de Cursos</a></li>
    </ul>
    
</body>
</html>
