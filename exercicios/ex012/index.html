<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo esta hospedado em meu próprio servidor.</p>

    <video src="midia/meu-video2.webm" width="560" controls></video>
    <!-- outro modo de adicionar vídeos de modo completo-->

    <video width="560" poster="imagens/dna-capa.jpg" controls autoplay loop>
        <source src="midia/meu-video2.mp4" type="video/mp4">
        <source src="midia/meu-video2.webm" type="video/webm">
        <source src="midia/meu-video.mp4" type="video/mp4">
        <p>Seu navegador não tem compatilibidade com reprodução de vídeos</p>
    </video>

    <h1>Inserir vídeos do Youtube</h1>
    <iframe title="YouTube video player" src="https://www.youtube.com/embed/QRPxOpr1-is?si=GaoUsxsKqpblXyWy" width="560" height="315"   frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>

    <h1>Inserir vídeos do vimeo</h1>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/1161535186?h=0235fb38ad" width="560" height="315" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>

</body>
</html>
